<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Air Buffalo BioPad</title>
  <style>
    :root {
      --blue: #0a33cc;
      --blue2: #061e88;
      --yellow: #f1d200;
      --green: #19a019;
      --red: #b10a0a;
      --cyan: #00cfff;
      --gray: #cfcfcf;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--gray);
      font-family: var(--sans);
      overflow: hidden;
    }

    .shell {
      height: 100dvh;
      box-sizing: border-box;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .screen {
      flex: 1;
      min-height: 0;
      background: var(--blue);
      border: 3px solid var(--yellow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top {
      background: rgba(0,0,0,.35);
      border-bottom: 1px solid rgba(255,255,255,.15);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand {
      font-family: var(--mono);
      font-weight: 900;
      color: var(--yellow);
      font-size: clamp(17px, 3vw, 28px);
      letter-spacing: .4px;
    }

    .device {
      font-family: var(--mono);
      color: rgba(255,255,255,.6);
      font-size: clamp(10px, 1.7vw, 14px);
      text-align: right;
    }

    .body {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      color: white;
    }

    .card {
      width: min(720px, 94vw);
      background: var(--blue2);
      border: 2px solid rgba(241,210,0,.9);
      box-shadow: 0 16px 50px rgba(0,0,0,.45);
      padding: clamp(18px, 4vw, 34px);
      box-sizing: border-box;
      text-align: center;
    }

    .title {
      font-family: var(--mono);
      font-weight: 900;
      color: var(--yellow);
      font-size: clamp(18px, 4vw, 38px);
      margin-bottom: 10px;
      letter-spacing: .3px;
    }

    .sub {
      font-family: var(--mono);
      color: rgba(255,255,255,.7);
      font-size: clamp(11px, 2vw, 16px);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .pairCode {
      width: 100%;
      box-sizing: border-box;
      background: rgba(0,0,0,.22);
      border: 2px solid rgba(255,255,255,.45);
      color: white;
      font-family: var(--mono);
      font-size: clamp(28px, 8vw, 70px);
      text-align: center;
      padding: 12px 14px;
      letter-spacing: 10px;
      outline: none;
    }

    .pairCode:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(241,210,0,.25);
    }

    .btnRow {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 2px solid rgba(255,255,255,.45);
      background: rgba(0,0,0,.18);
      color: white;
      font-family: var(--mono);
      font-weight: 900;
      font-size: clamp(13px, 2.4vw, 20px);
      padding: 13px 18px;
      cursor: pointer;
      min-width: 150px;
    }

    button.primary {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    button.green {
      border-color: #4cf04c;
      color: #4cf04c;
    }

    button.red {
      border-color: #ff7777;
      color: #ff7777;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      background: rgba(0,0,0,.35);
      border-top: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.8);
      font-family: var(--mono);
      font-size: clamp(11px, 2vw, 16px);
      padding: 10px 14px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .paxName {
      font-family: var(--mono);
      font-weight: 900;
      color: white;
      font-size: clamp(28px, 7vw, 64px);
      line-height: 1.05;
      margin: 10px 0;
      word-break: break-word;
    }

    .flightLine {
      font-family: var(--mono);
      font-weight: 900;
      color: var(--cyan);
      font-size: clamp(17px, 4vw, 34px);
      margin-bottom: 8px;
    }

    .seatLine {
      font-family: var(--mono);
      font-weight: 900;
      color: var(--yellow);
      font-size: clamp(22px, 6vw, 52px);
      margin-bottom: 20px;
    }

    .cameraBox {
      width: min(520px, 88vw);
      aspect-ratio: 4 / 3;
      background: rgba(0,0,0,.45);
      border: 3px solid rgba(255,255,255,.35);
      margin: 12px auto 16px;
      position: relative;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      background: #000;
    }

    .faceCircle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48%;
      height: 62%;
      transform: translate(-50%, -50%);
      border: 4px solid rgba(241,210,0,.85);
      border-radius: 50%;
      box-shadow: 0 0 0 999px rgba(0,0,0,.18);
      pointer-events: none;
    }

    .verifyText {
      font-family: var(--mono);
      color: var(--yellow);
      font-weight: 900;
      font-size: clamp(15px, 3vw, 26px);
      min-height: 34px;
      margin-top: 8px;
    }

    .resultPass {
      color: #4cf04c;
    }

    .resultFail {
      color: #ff7777;
    }

    .small {
      font-size: clamp(10px, 1.7vw, 14px);
      opacity: .65;
      font-family: var(--mono);
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="screen">
      <div class="top">
        <div class="brand">AIR BUFFALO BIOPAD</div>
        <div class="device" id="deviceInfo">DEVICE</div>
      </div>

      <div class="body" id="body"></div>

      <div class="status" id="status">STARTING...</div>
    </div>
  </div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1p1VK-CvkVaCc2-zAa2c2YYPN2V0jRv05drfuye-JHloLGxoBaAOOPoTtOiObBHZj/exec";

  const $ = id => document.getElementById(id);

  let DEVICE_ID = localStorage.getItem("abf_biopad_device_id");
  let DEVICE_NAME = localStorage.getItem("abf_biopad_device_name") || "Air Buffalo BioPad";
  let PAIRED = localStorage.getItem("abf_biopad_paired") === "TRUE";

  let CURRENT_TXN = null;
  let POLL_TIMER = null;
  let STREAM = null;

  let FACE_DETECTOR = null;
  let FACE_DETECTOR_READY = false;
  let FACE_LOOP_TIMER = null;
  let FACE_STABLE_COUNT = 0;
  let AUTO_VERIFY_IN_PROGRESS = false;
  let LAST_FACE_STATUS = "";

  if (!DEVICE_ID) {
    DEVICE_ID = "BIOPAD-" + (
      crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(36).slice(2)
    ).replace(/-/g, "").slice(0, 12).toUpperCase();

    localStorage.setItem("abf_biopad_device_id", DEVICE_ID);
  }

  $("deviceInfo").textContent = DEVICE_ID;

  function bioApi_(action, params, callback) {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PASTE_") === 0) {
      callback({ ok: false, error: "MISSING_APPS_SCRIPT_URL" });
      return;
    }

    const baseUrl = String(APPS_SCRIPT_URL || "").trim().replace(/\/$/, "");
    const cbName = "abfBioCb_" + Math.random().toString(36).slice(2);
    let completed = false;

    window[cbName] = function(res) {
      completed = true;

      try {
        callback(res);
      } finally {
        delete window[cbName];

        const old = document.getElementById(cbName);
        if (old) old.remove();
      }
    };

    const q = new URLSearchParams({
      api: "1",
      path: "bio",
      action: action,
      callback: cbName
    });

    Object.keys(params || {}).forEach(k => {
      q.set(k, params[k] == null ? "" : String(params[k]));
    });

    const src = baseUrl + "?" + q.toString();

    const s = document.createElement("script");
    s.id = cbName;
    s.src = src;

    s.onerror = function() {
      if (completed) return;

      completed = true;
      delete window[cbName];

      const old = document.getElementById(cbName);
      if (old) old.remove();

      callback({
        ok: false,
        error: "SCRIPT_LOAD_FAILED",
        detail: "Could not load Apps Script API URL.",
        url: src
      });
    };

    document.body.appendChild(s);

    setTimeout(() => {
      if (completed) return;

      completed = true;
      delete window[cbName];

      const old = document.getElementById(cbName);
      if (old) old.remove();

      callback({
        ok: false,
        error: "API_TIMEOUT",
        detail: "Apps Script loaded but did not call the JSONP callback.",
        url: src
      });
    }, 10000);
  }

  function setStatus_(msg) {
    $("status").textContent = msg || "";
  }

  function esc_(v) {
    return String(v == null ? "" : v)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function renderPair_() {
    stopPolling_();
    stopFaceLoop_();
    stopCamera_();
    CURRENT_TXN = null;
    AUTO_VERIFY_IN_PROGRESS = false;
    FACE_STABLE_COUNT = 0;

    $("body").innerHTML = `
      <div class="card">
        <div class="title">PAIR BIOPAD</div>
        <div class="sub">
          ON QIK GATE: SECONDARY KEYPAD &gt; BIOPAD PAIR<br>
          ENTER THE 6-DIGIT CODE BELOW
        </div>
        <input id="pairCode" class="pairCode" inputmode="numeric" maxlength="6" autocomplete="off" />
        <div class="btnRow">
          <button class="primary" onclick="submitPair_()">PAIR</button>
          <button onclick="resetPair_()">RESET DEVICE</button>
        </div>
        <div class="small">
          Camera stays live after pairing. Passenger verification starts automatically after gate scan.
        </div>
      </div>
    `;

    setTimeout(() => {
      const inp = $("pairCode");
      if (!inp) return;

      inp.focus();

      inp.addEventListener("input", () => {
        inp.value = inp.value.replace(/\D/g, "").slice(0, 6);
        if (inp.value.length === 6) submitPair_();
      });

      inp.addEventListener("keydown", ev => {
        if (ev.key === "Enter") submitPair_();
      });
    }, 50);

    setStatus_("WAITING FOR PAIR CODE");
  }

  function submitPair_() {
    const code = String($("pairCode")?.value || "").trim();

    if (!/^\d{6}$/.test(code)) {
      setStatus_("ENTER 6-DIGIT PAIR CODE");
      return;
    }

    setStatus_("PAIRING...");

    bioApi_("pair", {
      pairCode: code,
      deviceId: DEVICE_ID,
      deviceName: DEVICE_NAME
    }, res => {
      if (!res || !res.ok) {
        setStatus_("PAIR ERROR: " + ((res && (res.detail || res.error || res.message)) || "UNKNOWN"));
        return;
      }

      localStorage.setItem("abf_biopad_paired", "TRUE");
      PAIRED = true;

      setStatus_("PAIRED TO " + (res.station || "GATE") + " — STARTING CAMERA");
      renderLiveCamera_();
      startCamera_();
      initFaceDetector_();
      startPolling_();
    });
  }

  function resetPair_() {
    localStorage.removeItem("abf_biopad_paired");
    PAIRED = false;
    renderPair_();
  }

  function renderLiveCamera_() {
    $("body").innerHTML = `
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="position:relative;">
          <div class="cameraBox" style="width:100%;max-width:none;margin:0;border:0;aspect-ratio:4/3;">
            <video id="bioVideo" autoplay playsinline muted></video>
            <div class="faceCircle"></div>

            <div id="readyOverlay" style="
              position:absolute;
              top:12px;
              left:12px;
              right:12px;
              background:rgba(0,0,0,.58);
              border:2px solid rgba(241,210,0,.9);
              color:#fff;
              font-family:var(--mono);
              font-weight:900;
              padding:10px 12px;
              text-align:center;
              z-index:5;
            ">
              READY — CAMERA LIVE
            </div>

            <div id="paxBanner" style="
              display:none;
              position:absolute;
              left:0;
              right:0;
              bottom:0;
              background:rgba(6,30,136,.94);
              border-top:4px solid var(--yellow);
              padding:14px 16px;
              z-index:6;
              text-align:center;
            ">
              <div id="paxBannerName" style="
                font-family:var(--mono);
                font-size:clamp(23px,5vw,48px);
                font-weight:900;
                color:#fff;
                line-height:1.05;
              "></div>
              <div id="paxBannerSeat" style="
                font-family:var(--mono);
                font-size:clamp(20px,4vw,38px);
                font-weight:900;
                color:var(--yellow);
                margin-top:4px;
              "></div>
              <div id="paxBannerStatus" style="
                font-family:var(--mono);
                font-size:clamp(11px,2vw,17px);
                font-weight:900;
                color:var(--cyan);
                margin-top:8px;
              ">
                WAITING FOR FACE...
              </div>
            </div>
          </div>

          <div class="btnRow" style="padding:12px;margin-top:0;background:rgba(0,0,0,.25);">
            <button onclick="resetPair_()">UNPAIR</button>
            <button class="red" onclick="failCurrent_()">FAIL</button>
            <button onclick="cancelCurrent_()">CANCEL</button>
          </div>
        </div>
      </div>
    `;
  }

  async function startCamera_() {
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("getUserMedia unavailable. Check HTTPS and browser camera permissions.");
      }

      stopCamera_();

      STREAM = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      const video = $("bioVideo");
      if (video) {
        video.srcObject = STREAM;
        await video.play();
      }

      setStatus_("CAMERA LIVE — WAITING FOR GATE SCAN");
      startFaceLoop_();
    } catch (e) {
      STREAM = null;
      setStatus_("CAMERA ERROR: " + (e && e.message ? e.message : e));
    }
  }

  function stopCamera_() {
    try {
      if (STREAM) {
        STREAM.getTracks().forEach(t => t.stop());
      }
    } catch (e) {}

    STREAM = null;
  }

  async function initFaceDetector_() {
    if (FACE_DETECTOR_READY || FACE_DETECTOR) return;

    try {
      setStatus_("LOADING FACE DETECTOR...");

      const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs");

      const filesetResolver = await vision.FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
      );

      FACE_DETECTOR = await vision.FaceDetector.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        minDetectionConfidence: 0.55
      });

      FACE_DETECTOR_READY = true;
      setStatus_("CAMERA LIVE — FACE DETECTOR READY");
    } catch (e) {
      FACE_DETECTOR_READY = false;
      FACE_DETECTOR = null;
      setStatus_("FACE DETECTOR ERROR: " + (e && e.message ? e.message : e));
    }
  }

  function startFaceLoop_() {
    stopFaceLoop_();

    FACE_LOOP_TIMER = setInterval(() => {
      detectFaceTick_();
    }, 180);
  }

  function stopFaceLoop_() {
    if (FACE_LOOP_TIMER) {
      clearInterval(FACE_LOOP_TIMER);
      FACE_LOOP_TIMER = null;
    }
  }

  function detectFaceTick_() {
    const video = $("bioVideo");

    if (!video || !STREAM || video.readyState < 2) return;

    if (!FACE_DETECTOR_READY || !FACE_DETECTOR) {
      updateFaceStatus_("FACE DETECTOR LOADING...");
      return;
    }

    let hasFace = false;

    try {
      const result = FACE_DETECTOR.detectForVideo(video, performance.now());
      const detections = (result && result.detections) ? result.detections : [];
      hasFace = detections.length > 0;
    } catch (e) {
      updateFaceStatus_("FACE DETECTION ERROR");
      return;
    }

    if (hasFace) {
      FACE_STABLE_COUNT++;
      updateFaceStatus_(CURRENT_TXN ? "FACE DETECTED — VERIFYING..." : "FACE DETECTED — READY");
    } else {
      FACE_STABLE_COUNT = 0;
      updateFaceStatus_(CURRENT_TXN ? "WAITING FOR FACE..." : "READY — CAMERA LIVE");
    }

    if (
      CURRENT_TXN &&
      !AUTO_VERIFY_IN_PROGRESS &&
      FACE_STABLE_COUNT >= 4
    ) {
      autoVerifyCurrent_();
    }
  }

  function updateFaceStatus_(text) {
    if (LAST_FACE_STATUS === text) return;
    LAST_FACE_STATUS = text;

    const bannerStatus = $("paxBannerStatus");
    const readyOverlay = $("readyOverlay");

    if (CURRENT_TXN && bannerStatus) {
      bannerStatus.textContent = text;
    } else if (readyOverlay) {
      readyOverlay.textContent = text;
    }
  }

  function startPolling_() {
    stopPolling_();

    POLL_TIMER = setInterval(() => {
      bioApi_("poll", {
        deviceId: DEVICE_ID
      }, res => {
        if (!res) {
          setStatus_("POLL ERROR: NO RESPONSE");
          return;
        }

        if (res.ok === false) {
          setStatus_("POLL ERROR: " + (res.detail || res.error || res.message || "UNKNOWN"));
          return;
        }

        if (res.paired === false) {
          setStatus_(res.message || "DEVICE NOT PAIRED");
          stopPolling_();
          renderPair_();
          return;
        }

        if (res.pending) {
          if (!CURRENT_TXN || CURRENT_TXN.bioTxnId !== res.pending.bioTxnId) {
            receivePending_(res.pending);
          }
          return;
        }

        if (!CURRENT_TXN && !AUTO_VERIFY_IN_PROGRESS) {
          setStatus_("CAMERA LIVE — WAITING FOR GATE SCAN");
        }
      });
    }, 500);
  }

  function stopPolling_() {
    if (POLL_TIMER) {
      clearInterval(POLL_TIMER);
      POLL_TIMER = null;
    }
  }

  function receivePending_(p) {
    CURRENT_TXN = p;
    AUTO_VERIFY_IN_PROGRESS = false;
    FACE_STABLE_COUNT = 0;

    const banner = $("paxBanner");
    const name = $("paxBannerName");
    const seat = $("paxBannerSeat");
    const status = $("paxBannerStatus");
    const ready = $("readyOverlay");

    if (ready) ready.style.display = "none";

    if (banner) banner.style.display = "block";
    if (name) name.textContent = p.passengerName || "";
    if (seat) seat.textContent = "SEAT " + (p.seat || "");
    if (status) status.textContent = "WAITING FOR FACE...";

    setStatus_("VERIFYING " + (p.passengerName || "") + " — SEAT " + (p.seat || ""));
  }

  function clearCurrentTxn_() {
    CURRENT_TXN = null;
    AUTO_VERIFY_IN_PROGRESS = false;
    FACE_STABLE_COUNT = 0;

    const banner = $("paxBanner");
    const ready = $("readyOverlay");

    if (banner) banner.style.display = "none";
    if (ready) {
      ready.style.display = "block";
      ready.textContent = "READY — CAMERA LIVE";
    }

    setStatus_("CAMERA LIVE — WAITING FOR GATE SCAN");
  }

  function autoVerifyCurrent_() {
    if (!CURRENT_TXN || AUTO_VERIFY_IN_PROGRESS) return;

    AUTO_VERIFY_IN_PROGRESS = true;

    const status = $("paxBannerStatus");
    if (status) status.textContent = "MATCH CONFIRMED — SENDING TO GATE";

    setStatus_("MATCH CONFIRMED — SENDING PASS");

    setTimeout(() => {
      completeVerification_("PASS", 97, "MATCH_OK", "Simulated biometric match confirmed");
    }, 300);
  }

  function failCurrent_() {
    if (!CURRENT_TXN) {
      setStatus_("NO ACTIVE PASSENGER TO FAIL");
      return;
    }

    completeVerification_("FAIL", 42, "SIM_NO_MATCH", "Simulated biometric match failed");
  }

  function cancelCurrent_() {
    if (!CURRENT_TXN) {
      setStatus_("NO ACTIVE PASSENGER TO CANCEL");
      return;
    }

    completeVerification_("CANCELLED", 0, "CAMERA_CANCELLED", "Camera verification cancelled");
  }

  function completeVerification_(result, score, reasonCode, reasonText) {
    if (!CURRENT_TXN) return;

    const finishedTxn = CURRENT_TXN;

    bioApi_("complete", {
      deviceId: DEVICE_ID,
      bioTxnId: finishedTxn.bioTxnId,
      result: result,
      score: score,
      reasonCode: reasonCode,
      reasonText: reasonText
    }, res => {
      if (!res || !res.ok) {
        AUTO_VERIFY_IN_PROGRESS = false;
        setStatus_("COMPLETE ERROR: " + ((res && (res.detail || res.error || res.message)) || "UNKNOWN"));
        return;
      }

      const pass = String(res.status || "").toUpperCase() === "PASS";

      const bannerStatus = $("paxBannerStatus");
      if (bannerStatus) {
        bannerStatus.textContent = pass ? "PASS SENT — BOARDING COMPLETE" : "VERIFY FAILED — SEE AGENT";
        bannerStatus.style.color = pass ? "#4cf04c" : "#ff7777";
      }

      setStatus_(pass ? "PASS SENT TO GATE — BOARDING WILL COMPLETE" : "FAIL SENT TO GATE — REFER TO AGENT");

      setTimeout(() => {
        const bannerStatus2 = $("paxBannerStatus");
        if (bannerStatus2) {
          bannerStatus2.style.color = "var(--cyan)";
        }
        clearCurrentTxn_();
      }, 1200);
    });
  }

  if (PAIRED) {
    renderLiveCamera_();
    startCamera_();
    initFaceDetector_();
    startPolling_();
  } else {
    renderPair_();
  }
</script>
</body>
</html>
